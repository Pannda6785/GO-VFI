model:
  backbone_source: torchhub
  backbone_name: dinov2_vitb14
  backbone_hf_name: facebook/dinov2-base
  freeze_backbone: true
  proj_dim: 256
  num_heads: 8
  dropout: 0.0

data:
  dataset_root: Datasets/vimeo_triplet_augmented_full
  image_size: 224
  patch_size: 14
  min_patch_tokens: 1
  swap_pair_probability: 0.5
  crop_margin: 0.15
  mask_threshold: 0.3
  val_split: val
  subset_seed: 0
  max_train_samples: 4092
  max_val_samples: 512
  distinct_train_subset_per_epoch: true

train:
  batch_size: 256
  epochs: 3
  lr: 1.0e-4
  weight_decay: 1.0e-4
  max_grad_norm: 1.0
  pos_weight: 2.209272376046362
  num_workers: 0
  amp: true
  log_every_steps: 2
  checkpoint_every_steps: 8
  output_dir: Test/GOBC_train_bs256_e3_s4092_mps

eval:
  primary_metric: auroc
  batch_size: 128
  device: mps
